<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telr AI — Chat Screenshot Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="logo">
    <span class="logo-text">TELR</span>
    <span class="logo-badge">AI</span>
  </div>
  <span class="topbar-hint">Chat Screenshot Generator</span>
</div>

<div class="main">
  <div class="left-panel">

    <p class="section-label">Tester</p>
    <div class="setting-row">
      <span>Name</span>
      <input class="s-input" id="s-name" value="Emily" oninput="render()">
    </div>
    <div class="setting-row">
      <span>Description</span>
      <input class="s-input" id="s-desc" value="Subtle Flirt Specialist" oninput="render()">
    </div>
    <div class="setting-row">
      <span>Emoji</span>
      <input class="s-input" id="s-emoji" value="🌸" oninput="render()" style="width:70px">
    </div>
    <div class="setting-row">
      <span>Avatar colour</span>
      <input type="color" id="s-avatar" value="#FF6B9D" onchange="render()">
    </div>
    <div class="setting-row">
      <span>Bubble colour</span>
      <input type="color" id="s-bubble" value="#FF1744" onchange="render()">
    </div>
    <div class="setting-row">
      <span>Active tab</span>
      <select class="s-input" id="s-tab" onchange="render()" style="width:130px">
        <option value="testers">Testers</option>
        <option value="redflag">Red Flag</option>
      </select>
    </div>
    <div class="setting-row">
      <span>Show timestamps</span>
      <div class="toggle on" id="tog-time" onclick="togTime()"></div>
    </div>
    <div class="setting-row">
      <span>Show read</span>
      <div class="toggle" id="tog-read" onclick="togRead()"></div>
    </div>

    <p class="section-label" style="margin-top:24px">Messages</p>
    <div id="msg-list"></div>
    <div class="add-btns">
      <button class="btn-sec" onclick="addMsg('left')">+ Add left</button>
      <button class="btn-sec" onclick="addMsg('right')">+ Add right</button>
      <button class="btn-sec btn-red" onclick="clearMsgs()">✕ Clear</button>
    </div>

  </div>

  <div class="right-panel">
    <div class="preview-header">
      <span>Preview</span>
      <span class="preview-hint">390px wide</span>
    </div>
    <div class="preview-area">
      <div id="capture-root">
        <div id="app-screen"></div>
      </div>
    </div>
    <div class="dl-bar">
      <button class="btn-dl" onclick="downloadShot()">⬇ Download PNG</button>
    </div>
  </div>
</div>

<div id="loading" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="width:38px;height:38px;border:3px solid rgba(255,255,255,0.2);border-top-color:#FF6B9D;border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <p style="font-size:14px;color:rgba(255,255,255,0.7)">Generating...</p>
</div>

<input type="file" id="file-in" accept="image/*" style="display:none" onchange="handleFile(event)">
<script src="app.js"></script>
</body>
</html>
